name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: team-wolverine-showcase-main/package-lock.json
    
    - name: Install dependencies
      run: |
        cd team-wolverine-showcase-main
        npm ci
    
    - name: Run linter
      run: |
        cd team-wolverine-showcase-main
        npm run lint
    
    - name: Build application
      run: |
        cd team-wolverine-showcase-main
        npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-files
        path: team-wolverine-showcase-main/dist/

  docker:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./team-wolverine-showcase-main
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/team-wolverine:latest
          ${{ secrets.DOCKER_USERNAME }}/team-wolverine:${{ github.sha }}
